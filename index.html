function curQ(){const m=new Date().getMonth();return m<3?"Q1":m<6?"Q2":m<9?"Q3":"Q4"}
function pEnd(p,s){const d=new Date(),y=d.getFullYear(),m=d.getMonth();
  if(p==="monthly")return new Date(y,m+1,0);
  if(p==="quarterly")return m<3?new Date(y,2,31):m<6?new Date(y,5,30):m<9?new Date(y,8,30):new Date(y,11,31);
  if(p==="semi-annual")return s==="H2"?new Date(y,11,31):new Date(y,5,30);
  if(p==="annual")return new Date(y,11,31);
  return null}
function pStart(p,s){const d=new Date(),y=d.getFullYear(),m=d.getMonth();
  if(p==="monthly")return new Date(y,m,1);
  if(p==="quarterly")return m<3?new Date(y,0,1):m<6?new Date(y,3,1):m<9?new Date(y,6,1):new Date(y,9,1);
  if(p==="semi-annual")return s==="H2"?new Date(y,6,1):new Date(y,0,1);
  if(p==="annual")return new Date(y,0,1);
  return null}
function dLeft(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);return Math.ceil((d-t)/86400000)}
function isExp(b){
  if(b.used||b.per==="ongoing")return false;
  if((b.per==="semi-annual"||b.per==="quarterly")&&pStart(b.per,b.semi)>new Date())return false;
  const d=dLeft(pEnd(b.per,b.semi));if(d==null||d<0)return false;
  return d<=(b.per==="annual"?30:(b.per==="semi-annual"||b.per==="quarterly")?14:7)}
function needsReset(b){
  if(b.per==="ongoing")return false;
  const ps=pStart(b.per,b.semi);return ps&&ps<=new Date()&&ps>new Date(b.lastReset||0)}
function applyResets(cards){return cards.map(c=>({...c,benefits:c.benefits.map(b=>needsReset(b)?{...b,used:false,usedCount:(b.usedCount||0)+(b.used?1:0),lastReset:now()}:b)}))}
function curM(){const ms=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return ms[new Date().getMonth()]}
function pLbl(p,s){

  if(p==="semi-annual")return s==="H1"?"Jan-Jun":"Jul-Dec";if(p==="annual")return"Annual";return"Ongoing"}

function mkCard(t){return{...t,id:uid(),benefits:t.b.map(b=>({...b,id:uid(),used:false,usedCount:0,lastReset:now()}))}}
function mkVault(names){return names.map(n=>{const t=LIB.find(c=>c.n===n);return t?mkCard(t):null}).filter(Boolean)}

function Modal({children,onClose}){
  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:300}}>
    <div onClick={e=>e.stopPropagation()} style={{background:SF,border:"1px solid "+BD,borderRadius:"20px 20px 0 0",padding:"24px 20px",paddingBottom:"calc(28px + env(safe-area-inset-bottom))",width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      {children}
    </div>
  </div>}

function RoiPanel({card,onEditFee}){
  const fee=card.fee||0;const fd=card.feeDate?new Date(card.feeDate):null;
  const used=card.benefits.filter(b=>b.val>0).reduce((s,b)=>s+b.val*((b.usedCount||0)+(b.used?1:0)),0);
  const total=card.benefits.filter(b=>b.val>0).reduce((s,b)=>s+b.val,0);
  const net=used-fee;const fdys=fd?dLeft(fd):null;const fc=fdys!=null&&fdys>=0&&fdys<=60;
  const pct=total>0?Math.min(100,Math.round(used/total*100)):0;
  const rat=fee>0?Math.min(100,Math.round(used/fee*100)):100;
  let ver,vc,vb;
  if(fee===0){ver="No annual fee";vc=SC;vb="rgba(61,186,126,0.08)";}
  else if(rat>=100){ver="Worth it ✓";vc=SC;vb="rgba(61,186,126,0.08)";}
  else if(rat>=60){ver="Getting there";vc=WN;vb="rgba(245,158,11,0.08)";}
  else{ver="Behind on value";vc="#EF4444";vb="rgba(239,68,68,0.08)";}
  return <div style={{marginBottom:16}}>
    {fc&&<div className="ap" style={{display:"flex",alignItems:"center",gap:8,background:"rgba(245,158,11,0.07)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:10,padding:"9px 14px",marginBottom:10,flexWrap:"wrap"}}>
      <span>⏰</span><span style={{fontSize:12,color:WN,fontWeight:600}}>Annual fee due in {fdys===0?"today":fdys+" days"}</span>
      <span style={{fontSize:11,color:MT}}>Use your benefits before paying ${fee}!</span>
    </div>}
    <div style={{background:"rgba(255,255,255,0.025)",border:"1px solid "+BD,borderRadius:14,padding:"14px 16px"}}>
      <div style={{display:"flex",marginBottom:14}}>
        {[{l:"Benefits Used",v:"$"+used,s:"of $"+total+" potential/period",c:card.ac||TX},{l:"Annual Fee",v:fee===0?"Free":"$"+fee,s:fd?("Due "+fd.toLocaleDateString("en-US",{month:"short",day:"numeric"})):null,c:fee===0?SC:WN,ck:true},{l:"Net Savings",v:(net>=0?"+":"")+"$"+net,s:net>=0?"You're ahead!":"Use more benefits",c:net>=0?SC:"#EF4444"}].map((s,i)=>(
          <div key={i} onClick={s.ck?onEditFee:null} style={{flex:1,padding:"4px 10px",borderRight:i<2?"1px solid "+BD:"none",cursor:s.ck?"pointer":"default"}}>
            <div style={{fontSize:9,color:MT,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>{s.l}{s.ck&&<span style={{opacity:0.4}}> ✎</span>}</div>
            <div style={{fontSize:17,fontWeight:700,color:s.c,lineHeight:1}}>{s.v}</div>
            {s.s&&<div style={{fontSize:10,color:MT,marginTop:2}}>{s.s}</div>}
          </div>
        ))}
      </div>
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:10,color:MT}}>Benefit redemption progress</span>
          <span style={{fontSize:10,fontWeight:600,color:card.ac||TX}}>{pct}%</span>
        </div>
        <div style={{height:6,background:"rgba(255,255,255,0.07)",borderRadius:3,overflow:"hidden",position:"relative"}}>
          {fee>0&&total>0&&<div style={{position:"absolute",left:Math.min(99,Math.round(fee/total*100))+"%",top:0,bottom:0,width:2,background:"rgba(245,158,11,0.8)",zIndex:2}}/>}
          <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+(card.ac||SC)+"88,"+(card.ac||SC)+")",borderRadius:3,transition:"width 0.5s"}}/>
        </div>
        {fee>0&&total>0&&used<fee&&<div style={{fontSize:9,color:MT,marginTop:4}}>Orange line = break-even · Need ${fee-used} more to cover your fee</div>}
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{background:vb,borderRadius:20,padding:"4px 14px",fontSize:12,fontWeight:600,color:vc}}>{ver}</div>
        <button onClick={onEditFee} style={{background:"none",border:"1px solid "+BD,color:MT,borderRadius:8,padding:"5px 13px",fontSize:12,cursor:"pointer"}}>{fee===0&&!fd?"Set annual fee":"Edit fee / due date"}</button>
      </div>
    </div>
  </div>}

    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div><label style={LS}>Annual Fee ($)</label><input style={IS} type="number" min="0" value={fee} onChange={e=>setFee(e.target.value)} placeholder="e.g. 550"/></div>

            <span>{b.nm}</span>
            {b.val>0&&<span style={{fontWeight:700,color:WN}}>${b.val}</span>}
            <span style={{background:"rgba(245,158,11,0.25)",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:700,color:WN}}>{d===0?"Today!":d+"d"}</span>
          </div>)})}
      </div>
    </div>}
    <div style={{padding:"14px 16px 6px"}}>
      <div style={{position:"relative",height:160,maxWidth:420,margin:"0 auto",perspective:800}}
        onTouchStart={onTS} onTouchEnd={onTE}>
        {acc&&acc.cards.map((c,ci)=>{
          const is=ci===selIdx;
          const diff=ci-selIdx;
          const pct=c.benefits.length?Math.round(c.benefits.filter(b=>b.used).length/c.benefits.length*100):0;
          const cA=c.benefits.filter(b=>isExp(b)).length;
          const absD=Math.abs(diff);
          const tx=is?0:diff*55;
          const sc=is?1:Math.max(0.85,1-absD*0.05);
          const op=absD>3?0:is?1:Math.max(0.4,1-absD*0.2);
          const z=100-absD;
          return <div key={c.id} onClick={()=>{setSel(c.id);setTab("all")}}
            style={{position:"absolute",left:"50%",top:0,width:300,height:150,
              marginLeft:-150,
              background:c.gr,borderRadius:16,
              border:is?"2px solid "+c.ac:"1px solid rgba(255,255,255,0.08)",
              cursor:"pointer",overflow:"hidden",
              boxShadow:is?"0 8px 30px "+c.ac+"40":"0 2px 12px rgba(0,0,0,0.4)",
              transform:"translateX("+tx+"px) scale("+sc+")",
              opacity:op,zIndex:z,
              transition:"all 0.35s cubic-bezier(0.4,0,0.2,1)",
              pointerEvents:absD>3?"none":"auto"}}>
            <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,transparent 40%,"+c.ac+"15 100%)"}}/>
            <div style={{position:"relative",padding:"14px 18px",height:"100%",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:10,color:c.tc,opacity:0.5,fontWeight:500}}>{c.net}</div>
                  <div style={{fontSize:18,color:c.tc,fontWeight:600,marginTop:2}}>{c.sh}</div>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  {cA>0&&<div className="ap" style={{background:"rgba(245,158,11,0.3)",borderRadius:8,padding:"2px 8px",fontSize:10,color:WN,fontWeight:700}}>{cA} exp</div>}
                  {is&&<button onClick={e=>{e.stopPropagation();moveCard(c.id,-1)}} style={{background:"rgba(0,0,0,0.35)",border:"none",color:c.tc,borderRadius:6,width:24,height:24,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:selIdx>0?1:0.3}}>◀</button>}
                  {is&&<button onClick={e=>{e.stopPropagation();moveCard(c.id,1)}} style={{background:"rgba(0,0,0,0.35)",border:"none",color:c.tc,borderRadius:6,width:24,height:24,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:selIdx<(acc?acc.cards.length-1:0)?1:0.3}}>▶</button>}
                </div>
              </div>
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontSize:11,color:c.tc,opacity:0.6}}>{c.benefits.filter(b=>b.used).length}/{c.benefits.length} used</div>
                  {c.fee>0&&<div style={{fontSize:11,color:c.tc,opacity:0.5}}>${c.fee}/yr</div>}
                </div>
                <div style={{height:3,background:"rgba(255,255,255,0.12)",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:pct+"%",background:c.ac,borderRadius:2,transition:"width 0.4s"}}/>
                </div>
              </div>
            </div>
          </div>})}
      </div>
      <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:12,marginTop:6}}>
        <button onClick={goPrev} style={{background:"none",border:"none",color:selIdx>0?TX:MT,fontSize:18,cursor:"pointer",padding:"4px 10px",opacity:selIdx>0?1:0.3}}>‹</button>
        <div style={{display:"flex",gap:5}}>
          {acc&&acc.cards.map((c,ci)=><div key={c.id} onClick={()=>{setSel(c.id);setTab("all")}} style={{width:ci===selIdx?18:6,height:6,borderRadius:3,background:ci===selIdx?(c.ac||TX):"rgba(255,255,255,0.15)",cursor:"pointer",transition:"all 0.25s"}}/>)}
          <div onClick={()=>setAddC(true)} style={{width:6,height:6,borderRadius:3,background:"rgba(255,255,255,0.1)",cursor:"pointer",border:"1px dashed rgba(255,255,255,0.2)"}}/>
        </div>
        <button onClick={goNext} style={{background:"none",border:"none",color:selIdx<(acc?acc.cards.length-1:0)?TX:MT,fontSize:18,cursor:"pointer",padding:"4px 10px",opacity:selIdx<(acc?acc.cards.length-1:0)?1:0.3}}>›</button>
      </div>
    </div>
    {card?<div className="fi" style={{margin:"20px 16px 0"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:600,color:card.tc||TX,lineHeight:1}}>{card.n}</div>
          <div style={{fontSize:11,color:MT,marginTop:3}}>
            {card.benefits.filter(b=>b.used).length}/{card.benefits.length} used
            {card.benefits.filter(b=>b.val>0).length>0&&" · $"+card.benefits.filter(b=>b.val>0).reduce((s,b)=>s+b.val*((b.usedCount||0)+(b.used?1:0)),0)+" / $"+card.benefits.filter(b=>b.val>0).reduce((s,b)=>s+b.val,0)+" claimed (lifetime)"}
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setAddB(true)} className="bh" style={{background:"rgba(255,255,255,0.05)",border:"1px solid "+BD,color:TX,borderRadius:8,padding:"8px 14px",fontSize:14,cursor:"pointer"}}>+ Benefit</button>
          <button onClick={()=>doRC(card.id)} className="bh" style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",color:"#EF4444",borderRadius:8,padding:"8px 10px",fontSize:14,cursor:"pointer"}}>✕</button>
        </div>
      </div>
      <RoiPanel card={card} onEditFee={()=>setEditF(true)}/>
      <QuarterlyPanel card={card}/>
      <div style={{display:"flex",borderBottom:"1px solid "+BD,marginBottom:16,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {TABS.map(p=>{
          const cnt=card.benefits.filter(b=>p==="all"||b.per===p).length;
          if(cnt===0&&p!=="all")return null;
          const lbl=p==="all"?"All":p==="monthly"?"Monthly":p==="quarterly"?"Quarterly":p==="semi-annual"?"Semi-Ann":p.charAt(0).toUpperCase()+p.slice(1);
          return <button key={p} className="tb" onClick={()=>setTab(p)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:500,whiteSpace:"nowrap",color:tab===p?card.ac||"#C9A84C":MT,padding:"10px 13px 12px",marginBottom:-1,borderBottom:tab===p?"2px solid "+(card.ac||"#C9A84C"):"2px solid transparent"}}>
            {lbl} <span style={{fontSize:11,opacity:0.45}}>({cnt})</span>
          </button>})}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:2}}>
        {visBen.length===0&&<div style={{textAlign:"center",color:MT,fontSize:14,padding:"36px 0"}}>No benefits in this category</div>}
        {visBen.map(b=>{
          const iE=isExp(b);const d=b.per!=="ongoing"?dLeft(pEnd(b.per,b.semi)):null;
          const nY=b.per==="semi-annual"&&pStart(b.per,b.semi)>new Date();
          return <div key={b.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 10px",borderRadius:10,background:b.used?"rgba(61,186,126,0.04)":"transparent",border:iE?"1px solid rgba(245,158,11,0.22)":"1px solid transparent"}}>
            <div style={{width:38,height:38,borderRadius:10,flexShrink:0,background:b.used?"rgba(61,186,126,0.12)":card.ac+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:b.used?SC:card.ac}}>
              {b.used?"✓":cIco(b.cat)}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <span style={{fontSize:13,fontWeight:500,color:b.used?MT:TX,textDecoration:b.used?"line-through":"none"}}>{b.nm}</span>
                {b.val>0&&<span style={{fontSize:12,fontWeight:700,padding:"2px 9px",borderRadius:20,background:b.used?"rgba(61,186,126,0.1)":card.ac+"22",color:b.used?SC:card.ac}}>${b.val}</span>}
                <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"rgba(255,255,255,0.05)",color:MT}}>{pLbl(b.per,b.semi)}</span>
                {nY&&<span style={{fontSize:11,color:MT}}>starts {b.semi==="H2"?"Jul 1":"Jan 1"}</span>}
                {b.usedCount>0&&<span style={{fontSize:10,padding:"1px 8px",borderRadius:20,background:"rgba(61,186,126,0.12)",color:SC,fontWeight:500}}>{"used "+b.usedCount+"x"}</span>}
                {iE&&<span style={{fontSize:11,fontWeight:700,color:WN}}>{d===0?"Expires today!":d+"d left"}</span>}
              </div>
              <div style={{fontSize:12,color:MT,marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.dc}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
              <button className="bh" onClick={()=>togU(card.id,b.id)} style={{background:b.used?"rgba(61,186,126,0.14)":card.ac+"22",border:b.used?"1px solid rgba(61,186,126,0.3)":"1px solid "+card.ac+"44",color:b.used?SC:card.ac,borderRadius:8,padding:"7px 12px",fontSize:13,cursor:"pointer",fontWeight:600,minWidth:88,textAlign:"center"}}>
                {b.used?"✓ Used":"Mark Used"}
              </button>
              <button onClick={()=>doRB(card.id,b.id)} style={{background:"none",border:"none",color:MT,cursor:"pointer",fontSize:22,padding:"2px 6px",lineHeight:1,opacity:0.4}}>×</button>
            </div>
          </div>})}
      </div>
    </div>:<div style={{textAlign:"center",padding:"60px 20px",color:MT}}>
      <div style={{fontSize:48,marginBottom:12}}>💳</div>
      <div style={{fontSize:18,fontWeight:500,color:TX,marginBottom:8}}>No cards yet for {acc&&acc.name}</div>
      <div style={{fontSize:14,marginBottom:20}}>Add your first card to start tracking benefits</div>
      <button onClick={()=>setAddC(true)} style={{background:"rgba(255,255,255,0.07)",border:"1px solid "+BD,color:TX,borderRadius:12,padding:"13px 28px",fontSize:16,cursor:"pointer"}}>+ Add Card</button>
    </div>}
    {inst&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:SF,borderTop:"1px solid "+BD,padding:"14px 18px",paddingBottom:"calc(16px + env(safe-area-inset-bottom))",zIndex:400}}>
      <div style={{display:"flex",alignItems:"center",gap:12,maxWidth:1100,margin:"0 auto"}}>
        <div style={{fontSize:32}}>📲</div>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:TX,marginBottom:2}}>Install as iPhone App</div><div style={{fontSize:12,color:MT}}>Tap Share ↑ then "Add to Home Screen"</div></div>
        <button onClick={()=>setInst(false)} style={{background:"none",border:"none",color:MT,fontSize:24,cursor:"pointer"}}>×</button>
      </div>
    </div>}
    {addC&&<AddCardModal onAdd={doAC} onClose={()=>setAddC(false)}/>}
    {addB&&card&&<AddBenModal acc={card.ac} cid={card.id} onAdd={doAB} onClose={()=>setAddB(false)}/>}
    {manA&&<ManageAccModal accs={accs} onRen={doRA} onAdd={doAA} onRem={doRemA} onClose={()=>setManA(false)}/>}
    {editF&&card&&<EditFeeModal card={card} onSave={p=>{doUM(card.id,p);setEditF(false)}} onClose={()=>setEditF(false)}/>}
  </div>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(sw=>sw.unregister()));caches.keys().then(k=>k.forEach(c=>caches.delete(c)));}
</script>
</body>
</html>
